            - generic [ref=e110]:
              - paragraph [ref=e113]: Went in there just before 9pm on a sat night, it was located right next to our hotel. Service was efficient and friendly enough. We ordered vol au vent as mains, came with salad and chips and The Nugget (southern fried chicken wrap, came with salad and crisps). We thought the wrap would be a small portion due to the price €6.50. It was massive, will fill u up for a few hours. Both dishes were good and tasty. All came to just under €18.
              - generic [ref=e114]: Lily D
