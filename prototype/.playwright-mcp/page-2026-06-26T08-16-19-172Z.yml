          - generic [ref=e47]:
            - paragraph [ref=e51]: Our menu caters for all tastes and budgets with simple, wholesome food, vegetarian options and a kid’s menu. Features include our famous ‘Jobber’ Burger, Craft Beer Battered Fish and our renowned Chicken Wings with a mouth-watering house sauce.
