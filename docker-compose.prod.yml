# Production Docker Compose for Anton.
# Images are built and pushed by GitHub Actions to ghcr.io; this file only pulls and runs them.

services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-menu-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - digital-menu

  api:
    image: ghcr.io/stekolshchykov/digital-menu-api:main
    container_name: digital-menu-api
    environment:
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      WEB_ORIGIN: ${WEB_ORIGIN}
      API_ORIGIN: ${API_ORIGIN}
      APP_ENV: ${APP_ENV:-production}
      UPLOAD_DIR: /app/uploads
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_USE_PATH_STYLE: ${STORAGE_USE_PATH_STYLE:-true}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - digital-menu
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:${API_PORT:-3001}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    image: ghcr.io/stekolshchykov/digital-menu-web:main
    container_name: digital-menu-web
    environment:
      PORT: ${WEB_PORT:-3000}
      HOST: 0.0.0.0
      ORIGIN: ${WEB_ORIGIN}
      PUBLIC_API_ORIGIN: ${API_ORIGIN}
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - digital-menu
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:${WEB_PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  uploads_data:

networks:
  digital-menu:
