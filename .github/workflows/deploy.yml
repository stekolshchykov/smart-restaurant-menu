name: Build release artifacts and deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Build web release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:web

      - name: Build for production
        run: npm run build
        env:
          PUBLIC_API_ORIGIN: ${{ vars.PUBLIC_API_ORIGIN || 'http://localhost:3001' }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/build
          if-no-files-found: error

  build-api:
    name: Build API release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api

      - name: Release build
        run: cd apps/api && cargo build --release

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-release
          path: apps/api/target/release/digital-menu-api
          if-no-files-found: error

  build-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker buildx build \
            --push \
            --tag ghcr.io/${{ github.repository_owner }}/digital-menu-api:main \
            ./apps/api

      - name: Build and push web image
        run: |
          docker buildx build \
            --push \
            --build-arg PUBLIC_API_ORIGIN=${{ vars.PUBLIC_API_ORIGIN || 'http://localhost:3001' }} \
            --tag ghcr.io/${{ github.repository_owner }}/digital-menu-web:main \
            -f ./apps/web/Dockerfile .

      - name: Validate compose config
        run: docker compose config

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-web, build-api, build-images]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy production compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || '22' }}
          source: docker-compose.prod.yml
          target: /opt/digital-menu/
          strip_components: 0
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || '22' }}
          script_stop: true
          script: |
            mkdir -p /opt/digital-menu
            cd /opt/digital-menu

            cat > .env <<'EOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            API_PORT=${{ vars.API_PORT }}
            WEB_PORT=${{ vars.WEB_PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_EXPIRY_MINUTES=${{ vars.JWT_ACCESS_EXPIRY_MINUTES }}
            JWT_REFRESH_EXPIRY_DAYS=${{ vars.JWT_REFRESH_EXPIRY_DAYS }}
            ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
            WEB_ORIGIN=${{ vars.WEB_ORIGIN }}
            API_ORIGIN=${{ vars.API_ORIGIN }}
            APP_ENV=production
            STORAGE_ENDPOINT=${{ vars.STORAGE_ENDPOINT }}
            STORAGE_BUCKET=${{ vars.STORAGE_BUCKET }}
            STORAGE_ACCESS_KEY=${{ secrets.STORAGE_ACCESS_KEY }}
            STORAGE_SECRET_KEY=${{ secrets.STORAGE_SECRET_KEY }}
            STORAGE_REGION=${{ vars.STORAGE_REGION }}
            STORAGE_USE_PATH_STYLE=${{ vars.STORAGE_USE_PATH_STYLE }}
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for services to become healthy..."
            for i in $(seq 1 30); do
              api_ok=false
              web_ok=false
              curl -fsS http://localhost:${{ vars.API_PORT }}/health >/dev/null 2>&1 && api_ok=true
              curl -fsS http://localhost:${{ vars.WEB_PORT }}/health >/dev/null 2>&1 && web_ok=true
              if [ "$api_ok" = "true" ] && [ "$web_ok" = "true" ]; then
                echo "Both health checks passed."
                exit 0
              fi
              echo "Attempt $i: api=$api_ok web=$web_ok"
              sleep 2
            done
            echo "Health checks failed."
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=50 api
            exit 1
