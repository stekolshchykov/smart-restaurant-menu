name: Build release artifacts and Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Build web release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:web

      - name: Build for production
        run: npm run build
        env:
          PUBLIC_API_ORIGIN: ${{ vars.PUBLIC_API_ORIGIN || 'http://localhost:3001' }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/build
          if-no-files-found: error

  build-api:
    name: Build API release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api

      - name: Release build
        run: cd apps/api && cargo build --release

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-release
          path: apps/api/target/release/digital-menu-api
          if-no-files-found: error

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t digital-menu-api ./apps/api

      - name: Build web image
        run: docker build -t digital-menu-web -f ./apps/web/Dockerfile .

      - name: Validate compose config
        run: docker compose config
